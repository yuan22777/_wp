<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳郁安的個人網頁</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 150px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid var(--accent-color);
            margin-right: 30px;
        }

        .header-info h1 {
            margin: 0;
            font-size: 2.5em;
            color: var(--primary-color);
        }

        .header-info p {
            margin: 5px 0;
            color: #666;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent-color);
            border-left: 5px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-weight: bold;
            font-size: 0.9em;
            color: #888;
        }

        .content {
            font-size: 1.05em;
        }

        .tag {
            display: inline-block;
            background: var(--bg-color);
            padding: 5px 12px;
            border-radius: 20px;
            margin-right: 5px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; }
            .profile-pic { margin-right: 0; margin-bottom: 20px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="your-photo.jpg" alt="陳郁安" class="profile-pic">
        <div class="header-info">
            <h1>陳郁安</h1>
            <p>18 歲 | 女性 | 民國 96 年 2 月 7 日生</p>
            <p><strong>現居：</strong>新北市新店區新生街13巷18號3樓</p>
        </div>
    </header>

    <div class="section">
        <div class="section-title">聯絡方式</div>
        <div class="info-grid">
            <div class="info-item">
                <span class="label">電話</span>
                <span class="content">0903982469</span>
            </div>
            <div class="info-item">
                <span class="label">電子信箱</span>
                <span class="content">z111410504@student.nqu.edu.tw</span>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">教育背景</div>
        <div class="content">
            <p><strong>金門大學資工系</strong> (就讀中)</p>
            <p>景美女子中學 (畢業)</p>
        </div>
    </div>

    <div class="section">
        <div class="section-title">工作經歷</div>
        <div class="content">
            <p><strong>共同存在國際餐飲集團 - 晶湯匙</strong></p>
            <p>外場/服務人員 (曾任職)</p>
        </div>
    </div>

    <div class="section">
        <div class="section-title">語言與技能</div>
        <div class="info-item">
            <span class="label">語言能力</span>
            <div class="content">
                <span class="tag">中文 (聽說讀寫)</span>
                <span class="tag">英文 (聽說讀寫)</span>
                <span class="tag">閩南語 (聽說)</span>
            </div>
        </div>
        <div class="info-item" style="margin-top: 15px;">
            <span class="label">證照</span>
            <div class="content">普通重型機車駕照</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">興趣與專長</div>
        <div class="content">
            <span class="tag">羽球</span>
            <span class="tag">玩解謎類型遊戲</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">自我評價</div>
        <div class="content" style="font-style: italic; color: #555;">
            「我覺得跟我的名字一樣隨遇而安，個性隨和，遇到困難能冷靜解決不推辭。」
        </div>
    </div>
</div>

</body>
</html>
