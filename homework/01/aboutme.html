<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳郁安的個人簡介</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .resume-card {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            margin: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 2px;
            color: var(--primary-color);
        }

        .header p {
            margin: 10px 0 0;
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
            margin-left: 15px;
        }

        .info-content {
            padding-left: 5px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .tag {
            background: #ebf5fb;
            color: #2980b9;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .quote {
            background: #fdfefe;
            border-left: 4px solid #bdc3c7;
            padding: 15px;
            font-style: italic;
            color: #555;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .resume-card { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="resume-card">
    <div class="header">
        <h1>陳郁安</h1>
        <p>金門大學資訊工程學系</p>
    </div>

    <div class="section">
        <div class="section-title">聯絡資訊</div>
        <div class="info-content">
            <div>📞 0903-982-469</div>
            <div>✉️ s111410504@student.nqu.edu.tw</div>
            <div>📍 新北市新店區 / 金門縣金寧鄉</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">學歷</div>
        <div class="info-content">
            <strong>國立金門大學</strong> — 資工系 (在學中)<br>
            <strong>臺北市立景美女子高級中學</strong> (畢業)
        </div>
    </div>

    <div class="section">
        <div class="section-title">經歷</div>
        <div class="info-content">
            <strong>晶湯匙 (共同存在餐飲集團)</strong> — 服務人員
        </div>
    </div>

    <div class="section">
        <div class="section-title">技能與語言</div>
        <div class="tag-container">
            <span class="tag">中文</span>
            <span class="tag">英文</span>
            <span class="tag">閩南語</span>
            <span class="tag">普通重型機車駕照</span>
            <span class="tag">羽球</span>
            <span class="tag">解謎遊戲</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">自我評價</div>
        <div class="quote">
            「隨遇而安，個性隨和。遇到困難能冷靜解決不推辭。」
        </div>
    </div>
</div>

</body>
</html>
